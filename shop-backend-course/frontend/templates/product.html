{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
  <a class="back" href="/">← к каталогу</a>
  <article class="product">
    <div class="thumb big">{{ product.name[0] }}</div>
    <div class="info">
      <h1>{{ product.name }}</h1>
      <div class="price big">{{ "{:,.0f}".format(product.price).replace(",", " ") }} ₽</div>
      {% if product.description %}<p class="desc">{{ product.description }}</p>{% endif %}
      <form method="post" action="/cart/add">
        <input type="hidden" name="product_id" value="{{ product.id }}">
        <button class="btn" type="submit">В корзину</button>
      </form>
    </div>
  </article>
{% endblock %}
