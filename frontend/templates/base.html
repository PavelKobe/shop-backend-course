<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Магазин{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="/">◷ Магазин</a>
    <nav>
      <a href="/">Каталог</a>
      <a href="/cart" class="cart-link">Корзина{% if cart_count %} <span class="badge">{{ cart_count }}</span>{% endif %}</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="foot">Учебный магазин · собран в backend-курсе на FastAPI</footer>
</body>
</html>
